<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Growing Through Uncertainty – Round 1: The Spinning Compass</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; height: 100vh;
    background: #020a14;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
    display: flex; align-items: center; justify-content: center;
  }

  canvas#bg {
    position: fixed; inset: 0; z-index: 0;
  }

  .scene {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    width: 100vw; height: 100vh;
    pointer-events: none;
  }

  /* ── compass ── */
  .compass-wrap {
    position: relative;
    width: 320px; height: 320px;
    margin-bottom: 40px;
    display: flex; align-items: center; justify-content: center;
  }

  .compass-ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid transparent;
  }

  .ring-1 {
    width: 320px; height: 320px;
    border-color: rgba(0,210,255,0.18);
    animation: spin-cw 18s linear infinite;
  }
  .ring-2 {
    width: 270px; height: 270px;
    border-color: rgba(0,210,255,0.30);
    animation: spin-ccw 12s linear infinite;
  }
  .ring-3 {
    width: 220px; height: 220px;
    border-top-color: #00d2ff;
    border-right-color: rgba(0,210,255,0.4);
    border-bottom-color: rgba(0,210,255,0.1);
    border-left-color: rgba(0,210,255,0.25);
    animation: spin-cw 7s linear infinite;
    box-shadow: 0 0 18px rgba(0,210,255,0.12), inset 0 0 30px rgba(0,210,255,0.04);
  }
  .ring-4 {
    width: 170px; height: 170px;
    border-top-color: rgba(0,210,255,0.5);
    border-right-color: transparent;
    border-bottom-color: rgba(0,210,255,0.5);
    border-left-color: transparent;
    animation: spin-ccw 5s linear infinite;
  }

  .compass-face {
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 1px solid rgba(0,210,255,0.4);
    background: radial-gradient(circle at 40% 35%, rgba(0,210,255,0.08), rgba(2,10,20,0.95) 70%);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 40px rgba(0,210,255,0.15), 0 0 80px rgba(0,100,200,0.08);
  }

  .needle-wrap {
    position: absolute;
    width: 80px; height: 80px;
    animation: needle-spin 4s ease-in-out infinite;
  }
  .needle {
    position: absolute;
    left: 50%; top: 50%;
    transform-origin: center center;
  }
  .needle-n {
    width: 3px; height: 34px;
    background: linear-gradient(to top, transparent, #00d2ff);
    transform: translate(-50%, -100%);
    filter: drop-shadow(0 0 4px #00d2ff);
  }
  .needle-s {
    width: 3px; height: 28px;
    background: linear-gradient(to bottom, transparent, rgba(255,80,60,0.7));
    transform: translate(-50%, 0%);
  }
  .needle-center {
    width: 8px; height: 8px;
    background: #00d2ff;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    box-shadow: 0 0 10px #00d2ff;
  }

  /* tick marks around ring-3 */
  .ticks {
    position: absolute;
    width: 220px; height: 220px;
    border-radius: 50%;
    animation: spin-cw 7s linear infinite;
  }

  /* ── text ── */
  .label-round {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 4px;
    color: rgba(0,210,255,0.55);
    text-transform: uppercase;
    margin-bottom: 14px;
    animation: fadeUp 1s ease 0.4s both;
  }

  .title-main {
    font-family: 'Orbitron', monospace;
    font-size: clamp(28px, 4.5vw, 54px);
    font-weight: 900;
    color: #e8f8ff;
    text-align: center;
    line-height: 1.15;
    letter-spacing: 2px;
    text-shadow: 0 0 30px rgba(0,210,255,0.35), 0 0 60px rgba(0,100,200,0.2);
    animation: fadeUp 1s ease 0.6s both;
  }

  .title-sub {
    font-size: clamp(16px, 2.5vw, 24px);
    font-weight: 300;
    color: rgba(0,210,255,0.75);
    letter-spacing: 6px;
    text-align: center;
    margin-top: 8px;
    text-transform: uppercase;
    animation: fadeUp 1s ease 0.8s both;
  }

  .divider {
    width: 240px; height: 1px;
    background: linear-gradient(to right, transparent, rgba(0,210,255,0.5), transparent);
    margin: 28px auto;
    animation: fadeUp 1s ease 1s both;
  }

  .presenter-block {
    text-align: center;
    animation: fadeUp 1s ease 1.1s both;
  }
  .presenter-label {
    font-size: 11px;
    letter-spacing: 5px;
    color: rgba(0,210,255,0.4);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .presenter-name {
    font-family: 'Orbitron', monospace;
    font-size: clamp(18px, 2.8vw, 28px);
    font-weight: 700;
    color: #c8eeff;
    letter-spacing: 3px;
    text-shadow: 0 0 20px rgba(0,210,255,0.3);
  }
  .student-id {
    font-size: 13px;
    color: rgba(0,210,255,0.45);
    letter-spacing: 4px;
    margin-top: 5px;
  }

  /* corner HUD */
  .hud {
    position: fixed; z-index: 20;
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    color: rgba(0,210,255,0.35);
    letter-spacing: 2px;
    animation: fadeIn 2s ease 1.5s both;
    pointer-events: none;
  }
  .hud-tl { top: 24px; left: 28px; }
  .hud-tr { top: 24px; right: 28px; text-align: right; }
  .hud-bl { bottom: 24px; left: 28px; }
  .hud-br { bottom: 24px; right: 28px; text-align: right; }
  .hud div { margin: 3px 0; }
  .hud .blink { animation: blink 2.4s step-end infinite; }

  /* scanning line */
  .scanline {
    position: fixed; z-index: 5;
    width: 100vw; height: 2px;
    background: linear-gradient(to right, transparent 0%, rgba(0,210,255,0.12) 30%, rgba(0,210,255,0.22) 50%, rgba(0,210,255,0.12) 70%, transparent 100%);
    animation: scanDown 8s linear infinite;
    pointer-events: none;
  }

  /* grid overlay */
  .grid-overlay {
    position: fixed; inset: 0; z-index: 2;
    background-image:
      linear-gradient(rgba(0,210,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,210,255,0.025) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  /* ── keyframes ── */
  @keyframes spin-cw  { to { transform: rotate(360deg); } }
  @keyframes spin-ccw { to { transform: rotate(-360deg); } }

  @keyframes needle-spin {
    0%   { transform: rotate(-20deg); }
    30%  { transform: rotate(15deg); }
    55%  { transform: rotate(-8deg); }
    75%  { transform: rotate(25deg); }
    90%  { transform: rotate(-12deg); }
    100% { transform: rotate(-20deg); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.1; }
  }

  @keyframes scanDown {
    0%   { top: -4px; opacity: 0; }
    5%   { opacity: 1; }
    95%  { opacity: 1; }
    100% { top: 100vh; opacity: 0; }
  }

  /* side data bars */
  .data-bar {
    position: fixed; top: 50%; z-index: 15;
    transform: translateY(-50%);
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    color: rgba(0,210,255,0.3);
    letter-spacing: 1px;
    display: flex; flex-direction: column; gap: 6px;
    animation: fadeIn 2s ease 1.8s both;
    pointer-events: none;
  }
  .data-bar-left  { left: 18px; align-items: flex-start; }
  .data-bar-right { right: 18px; align-items: flex-end; }
  .db-row { display: flex; align-items: center; gap: 5px; }
  .db-bar-track {
    width: 60px; height: 2px;
    background: rgba(0,210,255,0.1);
    position: relative; overflow: hidden; border-radius: 2px;
  }
  .db-bar-fill {
    height: 100%; background: rgba(0,210,255,0.55);
    border-radius: 2px;
    animation: barPulse 3s ease-in-out infinite alternate;
  }
  @keyframes barPulse {
    from { opacity: 0.4; } to { opacity: 1; }
  }
</style>
</head>
<body>

<canvas id="bg"></canvas>
<div class="grid-overlay"></div>
<div class="scanline"></div>

<!-- HUD corners -->
<div class="hud hud-tl">
  <div>SYS_ONLINE</div>
  <div class="blink">● REC</div>
  <div id="clock">00:00:00</div>
</div>
<div class="hud hud-tr">
  <div>ROUND_01</div>
  <div>SESSION_ACTIVE</div>
  <div>AI_CORE_v4.6</div>
</div>
<div class="hud hud-bl">
  <div>NODE: 25040049</div>
  <div>STATUS: CALIBRATING</div>
</div>
<div class="hud hud-br">
  <div>SIGNAL: ████░ 82%</div>
  <div>ENTROPY: LOW</div>
</div>

<!-- side data bars left -->
<div class="data-bar data-bar-left">
  <div class="db-row"><span>NAV</span><div class="db-bar-track"><div class="db-bar-fill" style="width:75%; animation-delay:0s"></div></div></div>
  <div class="db-row"><span>ALG</span><div class="db-bar-track"><div class="db-bar-fill" style="width:60%; animation-delay:.4s"></div></div></div>
  <div class="db-row"><span>SYN</span><div class="db-bar-track"><div class="db-bar-fill" style="width:90%; animation-delay:.8s"></div></div></div>
  <div class="db-row"><span>INF</span><div class="db-bar-track"><div class="db-bar-fill" style="width:50%; animation-delay:1.2s"></div></div></div>
  <div class="db-row"><span>OPT</span><div class="db-bar-track"><div class="db-bar-fill" style="width:82%; animation-delay:1.6s"></div></div></div>
</div>

<!-- side data bars right -->
<div class="data-bar data-bar-right">
  <div class="db-row"><div class="db-bar-track"><div class="db-bar-fill" style="width:68%; animation-delay:.2s"></div></div><span>VIS</span></div>
  <div class="db-row"><div class="db-bar-track"><div class="db-bar-fill" style="width:44%; animation-delay:.6s"></div></div><span>PRO</span></div>
  <div class="db-row"><div class="db-bar-track"><div class="db-bar-fill" style="width:91%; animation-delay:1.0s"></div></div><span>NET</span></div>
  <div class="db-row"><div class="db-bar-track"><div class="db-bar-fill" style="width:57%; animation-delay:1.4s"></div></div><span>MEM</span></div>
  <div class="db-row"><div class="db-bar-track"><div class="db-bar-fill" style="width:76%; animation-delay:1.8s"></div></div><span>CPU</span></div>
</div>

<!-- main scene -->
<div class="scene">
  <div class="compass-wrap">
    <div class="compass-ring ring-1"></div>
    <div class="compass-ring ring-2"></div>
    <div class="compass-ring ring-3"></div>
    <div class="compass-ring ring-4"></div>
    <div class="compass-face">
      <div class="needle-wrap">
        <div class="needle needle-n"></div>
        <div class="needle needle-s"></div>
        <div class="needle needle-center"></div>
      </div>
    </div>
  </div>

  <div class="label-round">Round 01 &nbsp;·&nbsp; The Spinning Compass</div>

  <div class="title-main">Growing Through<br>Uncertainty</div>
  <div class="title-sub">Navigating the Unknown</div>

  <div class="divider"></div>

  <div class="presenter-block">
    <div class="presenter-label">Presenter</div>
    <div class="presenter-name">Hoàng Mạnh Dũng</div>
    <div class="student-id">ID &nbsp;·&nbsp; 25040049</div>
  </div>
</div>

<script>
// ── clock
function updateClock() {
  const n = new Date();
  const pad = v => String(v).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
}
setInterval(updateClock, 1000);
updateClock();

// ── canvas particle network
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
let W, H, particles = [], floaters = [];

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', () => { resize(); init(); });
resize();

function rand(a, b) { return a + Math.random() * (b - a); }

function init() {
  const N = Math.floor(W * H / 9000);
  particles = Array.from({ length: N }, () => ({
    x: rand(0, W), y: rand(0, H),
    vx: rand(-0.18, 0.18), vy: rand(-0.18, 0.18),
    r: rand(1, 2.4),
    alpha: rand(0.2, 0.7),
    pulse: rand(0, Math.PI * 2)
  }));

  // floating data fragments
  floaters = Array.from({ length: 14 }, () => ({
    x: rand(60, W - 60), y: rand(80, H - 80),
    vy: rand(-0.3, -0.08),
    text: makeFragment(),
    alpha: rand(0.08, 0.22),
    size: rand(9, 13)
  }));
}

const CHARS = '01アイウエオカキクケコサシスセソタチツテト';
function makeFragment() {
  let s = '';
  const len = Math.floor(rand(4, 14));
  for (let i = 0; i < len; i++) s += CHARS[Math.floor(Math.random() * CHARS.length)];
  return s;
}

function drawParticles(t) {
  ctx.clearRect(0, 0, W, H);

  // deep radial bg glow
  const g = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
  g.addColorStop(0, 'rgba(0,30,55,1)');
  g.addColorStop(1, 'rgba(2,10,20,1)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // center pulse glow
  const pulse = 0.5 + 0.5 * Math.sin(t * 0.001);
  const cg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 260 + 40*pulse);
  cg.addColorStop(0, `rgba(0,180,255,${0.04 + 0.03*pulse})`);
  cg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = cg;
  ctx.fillRect(0, 0, W, H);

  // connections
  ctx.lineWidth = 0.5;
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d2 = dx*dx + dy*dy;
      if (d2 < 14400) {
        const a = (1 - d2/14400) * 0.18;
        ctx.strokeStyle = `rgba(0,180,255,${a})`;
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.stroke();
      }
    }
  }

  // particles
  particles.forEach(p => {
    const a = p.alpha * (0.6 + 0.4 * Math.sin(t * 0.002 + p.pulse));
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,210,255,${a})`;
    ctx.fill();
    // soft halo
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r + 2, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,160,255,${a * 0.15})`;
    ctx.fill();
  });

  // floating text fragments
  ctx.fontKerning = 'none';
  floaters.forEach(f => {
    ctx.font = `${f.size}px monospace`;
    ctx.fillStyle = `rgba(0,210,255,${f.alpha})`;
    ctx.fillText(f.text, f.x, f.y);
  });
}

function update() {
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
  });
  floaters.forEach(f => {
    f.y += f.vy;
    if (f.y < -20) { f.y = H + 10; f.x = rand(60, W-60); f.text = makeFragment(); }
  });
}

let raf;
function loop(t) {
  drawParticles(t);
  update();
  raf = requestAnimationFrame(loop);
}

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
